<!DOCTYPE html>
<html>


<head>

    <title>Aula de html</title>
    <style>
        h1 {
            color: #004d29;
            font-size: 32px;
            text-align: center;
        }
        
        p {
            border: solid #000 1px;
        }
        
        #paragrafo {
            margin: 10px 12px 10px 25px;
        }
        
        .destaque {
            border-left: solid 3px red;
        }
    </style>
</head>

<body>
    <h1>Aula de CSS</h1>
    <a href="pagina2.html">Link para outra página</a>
    <p>Texto simples sem estilo</p>
    <p id="paragrafo">Texto com id</p>
    <p class="destaque">Texto com classe</p>
</body>

</html>
